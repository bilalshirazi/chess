<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Chess Openings Academy{% endblock %}</title>

  <!-- Chess board libraries via CDN -->
  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="{{ base }}/static/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base }}/" class="logo">♟ Chess Openings Academy</a>
      <nav>
        <a href="{{ base }}/">All Openings</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Chess Openings Academy · Learn chess step by step</p>
  </footer>

  <!-- jQuery (required by chessboard.js) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- chessboard.js -->
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <!-- chess.js for move validation / FEN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
