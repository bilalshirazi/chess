<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Chess Academy{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>" />

  <!-- Chessboard CSS (vendored) -->
  <link rel="stylesheet" href="{{ base }}/static/css/vendor-chessboard.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="{{ base }}/static/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ base }}/" class="logo">♟ Chess Academy</a>
      <nav>
        <a href="{{ base }}/">Openings</a>
        <a href="{{ base }}/pgn" style="margin-left:1.25rem;">PGN Viewer</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Chess Openings Academy · Learn chess step by step</p>
    <p class="footer-attribution">
      3D chess piece models by
      <a href="https://sketchfab.com/danielpaulse" target="_blank" rel="noopener">danielpaulse</a>
      on Sketchfab, licensed under
      <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>.
    </p>
  </footer>

  <!-- Expose base path so JS can build correct asset URLs -->
  <script>window.STATIC_BASE = "{{ base }}/static";</script>
  <!-- All scripts vendored (no external CDN required) -->
  <script src="{{ base }}/static/js/vendor/jquery.min.js"></script>
  <script src="{{ base }}/static/js/vendor/chessboard.min.js"></script>
  <script src="{{ base }}/static/js/vendor/chess.min.js"></script>
  <script src="{{ base }}/static/js/vendor/three.min.js"></script>
  <script src="{{ base }}/static/js/vendor/OrbitControls.js"></script>
  <script src="{{ base }}/static/js/vendor/GLTFLoader.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
